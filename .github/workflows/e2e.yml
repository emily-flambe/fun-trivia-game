name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Apply migrations to local D1
        run: npx wrangler d1 execute trivia-trainer --local --file=migrations/0004_redesign.sql && npx wrangler d1 execute trivia-trainer --local --file=migrations/0005_users.sql

      - name: Seed local D1
        run: node scripts/seed.mjs --local

      - name: Build SPA
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CF_ACCESS_TEST_EMAIL: test@trivia.emilycogsdill.com

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
